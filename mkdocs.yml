site_name: Curso de Programação Orientada a Objetos
site_description: Trilha de POO para Engenharia com C++ e Python
site_url: ""
repo_url: "https://github.com/rafaelrezo/curso-poo"
repo_name: "rafaelrezo/curso-poo"

theme:
  name: readthedocs
  locale: pt_BR
  include_homepage_in_sidebar: true
  navigation_depth: 6
  titles_only: false
  sticky_navigation: true
  collapse_navigation: false
  prev_next_buttons_location: bottom
  highlightjs: true
  hljs_languages:
    - cpp
    - python
    - json
    - yaml

plugins:
  - search
  - mkdocs-video

extra_css:
  - stylesheets/extra.css
  - stylesheets/readthedocs-responsive.css

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

# Materiais avaliativos e operacionais podem ficar versionados no repositório,
# mas não devem entrar no site publicado no GitHub Pages.
exclude_docs: |
  plano_de_implementacao.md
  referencias.md
  avaliacoes/
  guias_operacionais/github_classroom_pages.md
  guias_operacionais/uso_ia_skills.md
  projeto_integrador/
  parte-2-projeto/especificacao-projeto-final.md
  parte-2-projeto/especificacao-projeto-final.html
  parte-2-projeto/especificacao-projeto-final.pdf
  parte-2-projeto/07-persistencia.md
  parte-2-projeto/08-comunicacao-tcp.md

nav:
  - Início: index.md
  - 01. Fundamentos Git e IDE: fundamentos_git_ide/index.md
  - 01A. GitHub Classroom para Estudantes: fundamentos_git_ide/02_github_classroom_estudantes/index.md
  - 02. Fundamentos de POO em C++ e Python: fundamentos_poo_cpp_python/index.md
  - 03. Sobrecarga de Construtores em C++: fundamentos_poo_cpp_python/03_sobrecarga_construtores/index.md
  - 04. Acesso, Encapsulamento e Herança em C++: fundamentos_poo_cpp_python/04_encapsulamento_heranca/index.md
  - 05. Polimorfismo em C++: fundamentos_poo_cpp_python/05_polimorfismo/index.md
  - 06. Arquivos e JSON para Integração: fundamentos_poo_cpp_python/06_arquivos_json/index.md
  - 07. Datas, Horários e Timestamps: fundamentos_poo_cpp_python/07_data_timestamp/index.md
  - 08. UML e Diagrama de Classes: modelagem_analise_codigo/index.md
  - 09. Parte 2 - Projeto Integrador:
      - Visão geral: parte-2-projeto/index.md
      - 01. Cenário e Modelagem: parte-2-projeto/01-cenario-e-modelagem.md
      - 02. Aula integrada - Listas dinâmicas: parte-2-projeto/02-heranca-e-polimorfismo.md
      - 03. Aula integrada - Estado dos objetos: parte-2-projeto/03-encapsulamento-e-validacao.md
      - 04. Aula integrada - Atividade prática: parte-2-projeto/04-regras-de-controle.md
      - 05. Bancos de dados no supervisório: parte-2-projeto/05-bancos-de-dados-supervisorio.md
      - 06. Tratamento de Erros e Exceções: parte-2-projeto/06-tratamento-erros-excecoes.md
      - 07. Padrões I - Strategy, Command e Repository: parte-2-projeto/05-strategy-e-command.md
      - 08. Padrões II - Observer, Eventos e Alarmes: parte-2-projeto/06-observer-e-alarmes.md
      - 09. Fundamentos de Testes e Qualidade: parte-2-projeto/09-testes-e-validacao.md
      - 10. Testes Automatizados em C++ e Python: parte-2-projeto/10-testes-automatizados-cpp-python.md
      - 11. Execução Local, CI e Validação Real: parte-2-projeto/11-ci-validacao-producao.md
      - 12. Projeto Final: parte-2-projeto/10-projeto-final.md
  - 10. Checklist Profissional de Entrega: guias_operacionais/checklist_entrega_profissional.md
